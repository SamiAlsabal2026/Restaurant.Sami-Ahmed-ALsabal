</head>
<body>
  <div class="Contact">
        <h2>تسجيل الدخول</h2>
        <div class="social">
            <a href="#" class="icon" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" class="icon" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="icon" aria-label="Github"><i class="fab fa-github"></i></a>
            <a href="#" class="icon" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
        </div>
    <form class="form" action="#" ;>
      <var class="e">
      <input required type="full-name" name="user_name" placeholder="اسم العميل"> 
      </var>
      <input required type="email" name="user_email" placeholder="البريد الالكتروني">
      <input required type="number" name="user_number" placeholder="رقم الهاتف ">
      <textarea placeholder="الرسالة" rows="6"
          name="message" required minlength="10" title="الرسالة يجب على ان تحتوي على 10 أحرف على الأقل">
     </textarea>
    
     <button type="submit" >إرسال</button>
    </form>
    
  </div>
